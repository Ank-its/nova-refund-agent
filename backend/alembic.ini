[alembic]
script_location = alembic
prepend_sys_path = .
# URL is injected at runtime from app settings (env.py), this is a placeholder.
sqlalchemy.url = postgresql+asyncpg://nova_user:nova_pass_2024@postgres_db:5432/nova

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
